name: LinkedIn Auto Post

on:
  schedule:
    # Mon, Wed, Fri at 8:00 AM ET (13:00 UTC — adjusts ~1hr during DST)
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Force a specific topic (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (generate post but do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn bot
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="$ARGS --topic '${{ github.event.inputs.topic }}'"
          fi
          python bot.py $ARGS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          # PRIMARY_CLIENT_SECRET maps to LINKEDIN_CLIENT_SECRET in config.py
          PRIMARY_CLIENT_SECRET: ${{ secrets.PRIMARY_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          DEFAULT_TOPICS: ${{ vars.DEFAULT_TOPICS }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
